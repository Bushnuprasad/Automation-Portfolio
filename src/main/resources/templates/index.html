<!DOCTYPE html>
<html class="scroll-smooth" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Certification Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" th:href="@{/CSS/userDashboard.css}">
    <script th:src="@{/JS/script.js}"></script>
</head>

<body>
    <div class="dashboard">
        <!-- Profile on top -->
        <div class="home">
            <div class="profile">
                <div class="profile-picture">
                    <img th:src="${home.imagePath}" alt="Profile Picture">
                </div>
                <div class="user-profile">
                    <h3 th:text="${home.name}">Name</h3>
                    <p th:text="${home.tagline}">Tagline</p>
                    <p th:text="${home.shortBio}">Short Bio</p>
                </div>
                <div class="company-profile" th:if="${company != null}">
                    <img th:src="${company.imagePath}" width="80" style="border-radius:50%">
                    <h3 th:text="${company.companyName}"></h3>
                    <p th:text="${company.shortBio}"></p>
                </div>
            </div>
        </div>
        <!-- Main below -->
        <div class="main">
            <!-- Sidebar first -->
            <div class="sidebar">
                <a href="#">Certifications</a>
                <a href="#">Enrolled Courses</a>
                <a href="#">Enrolled Paths</a>
                <a href="#">Use Case Library</a>
                <a href="#">My Quiz Attempts</a>
                <a href="#">Logout</a>
            </div>

            <div class="sidebar2">
                <div class="tabs">
                </div>
            </div>
        </div>
    </div>
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelector('.tab[onclick="showTab(\'' + tabId + '\')"]').classList.add('active');
            document.getElementById(tabId).style.display = 'block';
        }
    </script>
</body>

</html>
