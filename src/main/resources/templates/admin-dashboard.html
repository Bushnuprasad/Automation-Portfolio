<!DOCTYPE html>
<html class="scroll-smooth" xmlns:th="http://www.thymeleaf.org">

</html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <script th:src="@{/JS/script.js}"></script>
    <title>Spotify-web player: music for everyone</title>
</head>

<body>
    <div class="main">
        <div class="header"></div>
        <div class="sidebar">
            <div class="sections">
                <div>
                    <i class="fa-solid fa-house"></i>
                </div>
                <div>
                    <span class="sectionsName">Home</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-id-badge"></i>
                </div>
                <div>
                    <span class="sectionsName">About me</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fa-solid fa-brain"></i>
                </div>
                <div>
                    <span class="sectionsName">Skills</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-laptop-code"></i>
                </div>
                <div>
                    <span class="sectionsName">Project</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-briefcase"></i>
                </div>
                <div>
                    <span class="sectionsName">Experience</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <span class="sectionsName">Education</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-file-alt"></i>
                </div>
                <div>
                    <span class="sectionsName">Resume</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-address-card"></i>
                </div>
                <div>
                    <span class="sectionsName">Contact</span>
                </div>
            </div>
            <div class="sections">
                <div>
                    <i class="fas fa-address-card"></i>
                </div>
                <div>
                    <span class="sectionsName">Social Media</span>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="home" id="home">
                <form action="/admin/saveHome" method="post" enctype="multipart/form-data">

                    <label>Name:</label>
                    <input type="text" name="name" required><br>

                    <label>Tagline:</label>
                    <input type="text" name="tagline" required><br>

                    <label>Short Bio:</label>
                    <textarea name="shortBio" rows="4"></textarea><br>

                    <label>Profile Image:</label>
                    <input type="file" name="imageFile"><br>

                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="aboutMe">
                <form id="aboutMeForm">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required><br>
                    <label for="tagline">Tagline:</label>
                    <input type="text" id="tagline" name="tagline" required><br>
                    <label for="shortBio">Short Bio:</label>
                    <textarea id="shortBio" name="shortBio" rows="5" required></textarea><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="skills">
                <form>
                    <label>Skill Name:</label>
                    <input type="text" name="name" required><br>
                    <label>Proficiency (%):</label>
                    <input type="number" name="level" required><br>
                    <label>Skill Image:</label>
                    <input type="file" name="imageFile"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div id="prject" class="home" style="top: 0%;">
                <form>
                    <label>Company Name:</label>
                    <input type="text" name="projectCompanyName" required><br>
                    <label>Project Title:</label>
                    <input type="text" name="projectTitle" required><br>
                    <label>Your Role:</label>
                    <input type="text" name="role" required></input><br>
                    <label>Duraction:</label>
                    <div id="dateRange">
                        <input type="date" name="startDate" required></input>
                        <input type="date" name="endDate" required></input>
                    </div>
                    <label>Description:</label>
                    <textarea name="description" rows="4" required></textarea><br>
                    <label>Technology Used:</label>
                    <input type="text" name="Technology" required><br>
                    <label>Profile Image:</label>
                    <input type="file" name="compnyImage"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="experience">
                <form>
                    <label>Company Name:</label>
                    <input type="text" name="companyName" required><br>
                    <label>Job Title:</label>
                    <input type="text" name="jobTitle" required><br>
                    <label>Short Bio:</label>
                    <textarea name="shortBio" rows="4"></textarea><br>
                    <label>Profile Image:</label>
                    <input type="file" name="imageFile"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="education">
                <form>
                    <label>Name:</label>
                    <input type="text" name="name" required><br>
                    <label>Tagline:</label>
                    <input type="text" name="tagline" required><br>
                    <label>Short Bio:</label>
                    <textarea name="shortBio" rows="4"></textarea><br>
                    <label>Profile Image:</label>
                    <input type="file" name="imageFile"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="resume">
                <form>
                    <label>Name:</label>
                    <input type="text" name="name" required><br>
                    <label>Tagline:</label>
                    <input type="text" name="tagline" required><br>
                    <label>Short Bio:</label>
                    <textarea name="shortBio" rows="4"></textarea><br>
                    <label>Profile Image:</label>
                    <input type="file" name="imageFile"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
            <div class="home" id="contact">
                <form>
                    <label>Name:</label>
                    <input type="text" name="name" required><br>
                    <label>Tagline:</label>
                    <input type="text" name="tagline" required><br>
                    <label>Short Bio:</label>
                    <textarea name="shortBio" rows="4"></textarea><br>
                    <label>Profile Image:</label>
                    <input type="file" name="imageFile"><br>
                    <button type="submit">Save</button>
                </form>
            </div>
        </div>
        <div class="footer"></div>
    </div>
</body>

</html>
